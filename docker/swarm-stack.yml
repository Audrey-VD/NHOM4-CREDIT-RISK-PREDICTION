version: '3.9'

services:
  credit-risk:
    image: credit-risk:1.0

    ports:
      - "8000:8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    deploy:
      replicas: 3

      placement:
        max_replicas_per_node: 1

      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback

      restart_policy:
        condition: on-failure
        max_attempts: 3

      resources:
        limits:
          memory: 512M
          cpus: "0.5"
